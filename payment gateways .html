<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Wallet App</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <!-- Cashfree SDK -->
    <script src="https://sdk.cashfree.com/js/v3/cashfree.js"></script>

    <style>
        /* Sections ko hide/show karne ke liye classes */
        .hidden {
            display: none !important;
        }

        .visible {
            display: block !important;
        }

        /* Loading Screen Style */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>

<body class="bg-light">

    <!-- 1️⃣ LOADING SCREEN -->
    <div id="loading-screen">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <!-- 2️⃣ AUTH SECTION (Login/Signup) -->
    <div id="auth-section" class="container d-flex align-items-center justify-content-center vh-100 hidden">
        <div class="card p-4 shadow-sm" style="max-width: 400px; width: 100%;">
            <h3 class="text-center mb-4">Wallet App</h3>

            <ul class="nav nav-tabs mb-3" id="authTab" role="tablist">
                <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#login-tab">Login</button></li>
                <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#signup-tab">Sign Up</button></li>
            </ul>

            <div class="tab-content">
                <!-- Login Form -->
                <div class="tab-pane fade show active" id="login-tab">
                    <input type="email" id="login-email" class="form-control mb-2" placeholder="Email">
                    <input type="password" id="login-pass" class="form-control mb-3" placeholder="Password">
                    <button onclick="handleLogin()" class="btn btn-primary w-100">Login</button>
                </div>

                <!-- Signup Form -->
                <div class="tab-pane fade" id="signup-tab">
                    <input type="text" id="reg-name" class="form-control mb-2" placeholder="Full Name">
                    <input type="email" id="reg-email" class="form-control mb-2" placeholder="Email">
                    <input type="password" id="reg-pass" class="form-control mb-3" placeholder="Password">
                    <button onclick="handleRegister()" class="btn btn-success w-100">Sign Up</button>
                </div>
            </div>
            <p id="auth-msg" class="text-center text-danger mt-3 small"></p>
        </div>
    </div>

    <!-- 3️⃣ DASHBOARD SECTION (Wallet) -->
    <div id="dashboard-section" class="hidden">
        <!-- Navbar -->
        <nav class="navbar navbar-dark bg-primary p-3">
            <span class="navbar-brand mb-0 h1">My Wallet</span>
            <button onclick="handleLogout()" class="btn btn-sm btn-light">Logout</button>
        </nav>

        <div class="container mt-4">
            <!-- Balance Card -->
            <div class="card shadow-sm text-center p-4 mb-4">
                <h5 class="text-muted">Welcome, <span id="user-display-name">User</span></h5>
                <h1 class="display-4 fw-bold text-success">₹ <span id="balance">0.00</span></h1>
                <p class="text-muted small">Wallet Balance</p>
                <hr>

                <div class="input-group mb-3">
                    <span class="input-group-text">₹</span>
                    <input type="number" id="amount-input" class="form-control" placeholder="Enter Amount (e.g. 100)">
                </div>
                <button onclick="initiatePayment()" class="btn btn-dark w-100 btn-lg">ADD MONEY</button>
            </div>

            <!-- Transaction History -->
            <div>
                <h5>Recent Transactions</h5>
                <ul class="list-group" id="transaction-list">
                    <li class="list-group-item text-center text-muted">Loading transactions...</li>
                </ul>
            </div>
        </div>
    </div>

    <!-- JS Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // --- CONFIGURATION ---
        const firebaseConfig = {
  apiKey: "AIzaSyAYIGBRh-GoJgJ0dC0VTkilfGZ2Ee8Ap7o",
  authDomain: "payment-gateways-e7c44.firebaseapp.com",
  databaseURL: "https://payment-gateways-e7c44-default-rtdb.firebaseio.com",
  projectId: "payment-gateways-e7c44",
  storageBucket: "payment-gateways-e7c44.firebasestorage.app",
  messagingSenderId: "843823293647",
  appId: "1:843823293647:web:cd7f25cbaa988c8a4ec3ba"
};

        // Is URL ko apne Replit Backend URL se replace karein
        const BACKEND_URL = "https://45259f71-741d-4d72-850d-18d64379ff09-00-lshyulivmmsc.sisko.replit.dev/";

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        const cashfree = Cashfree({
            mode: "sandbox"
        }); // Production ke liye "production" karein

        // --- UI ELEMENTS ---
        const loadingScreen = document.getElementById('loading-screen');
        const authSection = document.getElementById('auth-section');
        const dashboardSection = document.getElementById('dashboard-screen'); // Fixed ID reference
        const dashDiv = document.getElementById('dashboard-section');

        // --- AUTH STATE LISTENER (The Magic Part) ---
        auth.onAuthStateChanged(user => {
            loadingScreen.classList.add('hidden'); // Hide loader

            if (user) {
                // User is Logged In
                authSection.classList.add('hidden');
                dashDiv.classList.remove('hidden');
                loadDashboardData(user);
            } else {
                // User is Logged Out
                dashDiv.classList.add('hidden');
                authSection.classList.remove('hidden');
            }
        });

        // --- AUTH FUNCTIONS ---
        function handleLogin() {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            auth.signInWithEmailAndPassword(email, pass)
                .catch(e => document.getElementById('auth-msg').innerText = e.message);
        }

        function handleRegister() {
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;
            const name = document.getElementById('reg-name').value;

            if (!name || !email || !pass) return alert("All fields required");

            auth.createUserWithEmailAndPassword(email, pass).then((cred) => {
                    // Create User in Database
                    return db.ref('users/' + cred.user.uid).set({
                        name: name,
                        email: email,
                        wallet_balance: 0,
                        created_at: new Date().toISOString()
                    });
                })
                .catch(e => document.getElementById('auth-msg').innerText = e.message);
        }

        function handleLogout() {
            auth.signOut();
            // Page reload to clear old data from memory
            window.location.reload();
        }

        // --- DASHBOARD FUNCTIONS ---
        function loadDashboardData(user) {
            // 1. Listen to Balance
            db.ref('users/' + user.uid).on('value', snapshot => {
                const data = snapshot.val();
                if (data) {
                    document.getElementById('balance').innerText = (data.wallet_balance || 0).toFixed(2);
                    document.getElementById('user-display-name').innerText = data.name;
                }
            });

            // 2. Listen to Transactions
            const historyList = document.getElementById('transaction-list');
            db.ref('transactions').orderByChild('userUID').equalTo(user.uid).limitToLast(10)
                .on('value', snapshot => {
                    historyList.innerHTML = "";
                    const transactions = [];
                    snapshot.forEach(child => transactions.push(child.val()));

                    // Reverse to show latest first
                    transactions.reverse().forEach(t => {
                        const color = t.status === 'SUCCESS' ? 'success' : 'danger';
                        const symbol = t.status === 'SUCCESS' ? '+' : '';

                        historyList.innerHTML += `
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            <div>
                                <small class="text-muted">${new Date(t.date).toLocaleDateString()}</small><br>
                                <span class="badge bg-${color}">${t.status}</span>
                            </div>
                            <span class="fw-bold text-${color}">${symbol} ₹${t.amount}</span>
                        </li>
                    `;
                    });

                    if (transactions.length === 0) {
                        historyList.innerHTML = '<li class="list-group-item text-center">No transactions yet.</li>';
                    }
                });
        }

        // --- PAYMENT FUNCTION ---
        async function initiatePayment() {
            const amount = document.getElementById('amount-input').value;
            const user = auth.currentUser;

            if (!amount || amount < 1) return alert("Please enter a valid amount");

            const btn = document.querySelector('button[onclick="initiatePayment()"]');
            btn.innerHTML = "Processing...";
            btn.disabled = true;

            try {
                // 1. Create Order on Backend
                const response = await fetch(`${BACKEND_URL}/create-order`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        amount: amount,
                        userId: user.uid,
                        userEmail: user.email
                    })
                });

                const data = await response.json();

                if (!data.payment_session_id) {
                    throw new Error("Failed to create order");
                }

                // 2. Open Cashfree Checkout
                const checkoutOptions = {
                    paymentSessionId: data.payment_session_id,
                    redirectTarget: "_modal"
                };

                cashfree.checkout(checkoutOptions).then((result) => {
                    if (result.error) {
                        alert("User cancelled or Payment Failed");
                    }
                    // Payment window closed, check verification in background
                    // Backend automatically handles the webhook/verification logic
                    console.log("Payment window closed");
                });

            } catch (error) {
                console.error(error);
                alert("Error: " + error.message);
            } finally {
                btn.innerHTML = "ADD MONEY";
                btn.disabled = false;
            }
        }
    </script>
</body>

</html>
